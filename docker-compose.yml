version: '3.8'

services:
  howlify_app:
    build: .
    container_name: howlify_dashboard
    ports:
      - "8502:8501"   # host 8502 → contenedor 8501
    env_file: .env
    restart: always

  evolution_api:
    build: 
      context: ./evolution-api
      dockerfile: Dockerfile
    container_name: evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=wolf_secret_key_123
      - WABA_CASH_REDIS=false
      - DATABASE_ENABLED=true
      - DATABASE_CONNECTION_URI=file:../database/data.db
      - DATABASE_CONNECTION_CLIENT_NAME=sqlite
    volumes:
      - evolution_instances:/evolution/instances

volumes:
  evolution_instances:
